<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>捕捉宇宙的脈動 | 天文股展覽</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --accent-gold: #ffcc00;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* 核心背景：宇宙深空圖 */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: #02040a url('bg.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.4);
        }

        /* 暗角效果 (Vignette) */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.85) 100%);
            pointer-events: none;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: transparent;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* 流星飛行路徑動畫 */
        @keyframes flight-path {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 0;
            }

            5% {
                opacity: 1;
                transform: translate(-10px, 7px) scale(1);
            }

            100% {
                transform: translate(-1500px, 1050px) scale(1);
                opacity: 0;
            }
        }

        /* 外星人自轉動畫 */
        @keyframes alien-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .meteor-wrapper {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            animation: flight-path 3.5s linear forwards;
        }

        .shooting-star {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, #fff, transparent);
            filter: drop-shadow(0 0 5px #fff);
            transform: rotate(-35deg);
        }

        .alien-meteor {
            width: 45px;
            height: 45px;
            background-image: url('202007241643330.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-blue);
            animation: alien-spin 2s linear infinite;
        }

        .portal {
            text-align: center;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 2.2em;
            letter-spacing: 5px;
            margin: 0;
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            font-weight: 800;
        }

        p {
            font-size: 1em;
            color: #aaa;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
            align-items: center;
        }

        .enter-btn {
            padding: 15px 40px;
            border: 1px solid var(--neon-blue);
            background: rgba(0, 0, 0, 0.5);
            color: var(--neon-blue);
            font-size: 1.1em;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            display: inline-block;
            cursor: pointer;
            width: 180px;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
            transform: translateY(-2px);
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8em;
            color: #555;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
                letter-spacing: 3px;
            }

            p {
                font-size: 0.85em;
                letter-spacing: 1px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-layer"></div>
    <div class="vignette"></div>
    <div class="stars-container" id="stars"></div>

    <div class="portal">
        <h1>捕捉宇宙的脈動</h1>
        <p>— 2026 Earth Science Exhibition —</p>

        <div class="btn-group">
            <a href="radial_velocity_method.html" class="enter-btn">徑向速度法</a>
            <a href="transit_method.html" class="enter-btn">凌日法</a>
        </div>
    </div>

    <footer>
        © 2026 Earth Science Exhibition
    </footer>

    <script>
        const starsContainer = document.getElementById('stars');
        const starCount = 120;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }

        function createMeteor() {
            const isAlien = Math.random() > 0.6;

            // 創建飛行路徑容器
            const wrapper = document.createElement('div');
            wrapper.className = 'meteor-wrapper';
            wrapper.style.top = Math.random() * 50 + '%';
            wrapper.style.left = (Math.random() * 30 + 70) + '%';

            // 創建內容 (流星或外星人)
            const content = document.createElement('div');
            if (isAlien) {
                content.className = 'alien-meteor';
            } else {
                content.className = 'shooting-star';
            }

            wrapper.appendChild(content);
            starsContainer.appendChild(wrapper);

            setTimeout(() => wrapper.remove(), 4000);
        }

        // 隨機間隔產生
        (function meteorLoop() {
            const next = 2000 + Math.random() * 5000;
            setTimeout(() => {
                createMeteor();
                meteorLoop();
            }, next);
        })();
    </script>

</body>

</html>
