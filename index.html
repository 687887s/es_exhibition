<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>捕捉宇宙的脈動 | 地科展覽</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --accent-gold: #ffcc00;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #02040a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* 深空背景圖 */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url('deep_space_background_1777050861196.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.6);
            transition: transform 0.5s ease-out;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.5) 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 流星 - 增加亮度與長度 */
        .shooting-star {
            position: absolute;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, #fff, rgba(255,255,255,0.4), transparent);
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            filter: drop-shadow(0 0 5px #fff);
            transform: rotate(-35deg);
            animation: shooting 2.5s cubic-bezier(0.2, 0, 0.4, 1) forwards;
        }

        @keyframes shooting {
            0% { transform: translate(0,0) rotate(-35deg) scale(0); opacity: 0; }
            5% { opacity: 1; transform: translate(-10px, 7px) rotate(-35deg) scale(1); }
            100% { transform: translate(-1200px, 840px) rotate(-35deg) scale(1); opacity: 0; }
        }

        .portal {
            text-align: center;
            padding: 20px;
            z-index: 10;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            font-size: 3em;
            letter-spacing: 6px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 25px var(--neon-blue), 0 0 50px rgba(0, 242, 255, 0.3);
            font-weight: 800;
            line-height: 1.2;
        }

        p {
            font-size: 1.2em;
            color: var(--neon-blue);
            margin-top: 20px;
            letter-spacing: 4px;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            opacity: 0.9;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 50px;
            align-items: center;
        }

        .enter-btn {
            padding: 16px 45px;
            border: 1px solid var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-blue);
            font-size: 1.2em;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            display: inline-block;
            cursor: pointer;
            width: 200px;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(8px);
            font-weight: 600;
            letter-spacing: 2px;
        }

        .enter-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
            transform: scale(1.05) translateY(-3px);
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8em;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }

        /* 手機版適配 */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
                letter-spacing: 3px;
            }
            p {
                font-size: 0.85em;
                letter-spacing: 2px;
            }
            .enter-btn {
                padding: 12px 30px;
                font-size: 1em;
                width: 160px;
            }
            .portal {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-image" id="bgImage"></div>
    <div class="stars-container" id="stars"></div>

    <div class="portal">
        <h1>捕捉宇宙的脈動</h1>
        <p>DEEP SPACE EXPLORATION — 2026</p>

        <div class="btn-group">
            <a href="radial_velocity_method.html" class="enter-btn">徑向速度法</a>
            <a href="transit_method.html" class="enter-btn">凌日法</a>
        </div>
    </div>

    <footer>
        © 2026 Earth Science Exhibition
    </footer>

    <script>
        const starsContainer = document.getElementById('stars');
        const bgImage = document.getElementById('bgImage');
        const starCount = 120;

        // 星場
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }

        // 流星
        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.top = Math.random() * 40 + '%';
            star.style.left = (Math.random() * 40 + 60) + '%';
            starsContainer.appendChild(star);
            setTimeout(() => star.remove(), 2600);
        }

        setInterval(() => {
            if (Math.random() > 0.3) createShootingStar();
        }, 4000);

        // 視差效果
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            bgImage.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
        });
    </script>

</body>

</html>
