<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>捕捉宇宙的脈動 | 天文股展覽</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --accent-gold: #ffcc00;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 將星場漸層設在 body，確保不擋住內容 */
            background: radial-gradient(circle at center, #001133 0%, #000 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* 內容容器層 (透明，僅用於放置星星) */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: transparent;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 流星 - 確保 z-index 足夠高且不被遮擋 */
        .shooting-star {
            position: absolute;
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, #fff, transparent);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transform: rotate(-35deg);
            animation: shooting 3s linear forwards;
        }

        @keyframes shooting {
            0% { transform: translate(0, 0) rotate(-35deg) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translate(-20px, 14px) rotate(-35deg) scale(1); }
            100% { transform: translate(-1000px, 700px) rotate(-35deg) scale(1); opacity: 0; }
        }

        .portal {
            text-align: center;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 2.2em;
            letter-spacing: 5px;
            margin: 0;
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            font-weight: 800;
        }

        p {
            font-size: 1em;
            color: #aaa;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
            align-items: center;
        }

        .enter-btn {
            padding: 15px 40px;
            border: 1px solid var(--neon-blue);
            background: rgba(0, 0, 0, 0.3);
            color: var(--neon-blue);
            font-size: 1.1em;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            display: inline-block;
            cursor: pointer;
            width: 180px;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8em;
            color: #444;
            letter-spacing: 1px;
            z-index: 10;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; letter-spacing: 3px; }
            p { font-size: 0.85em; letter-spacing: 1px; }
        }
    </style>
</head>

<body>

    <div class="stars-container" id="stars"></div>

    <div class="portal">
        <h1>捕捉宇宙的脈動</h1>
        <p>— 2026 Earth Science Exhibition —</p>

        <div class="btn-group">
            <a href="radial_velocity_method.html" class="enter-btn">徑向速度法</a>
            <a href="transit_method.html" class="enter-btn">凌日法</a>
        </div>
    </div>

    <footer>
        © 2026 Earth Science Exhibition
    </footer>

    <script>
        const starsContainer = document.getElementById('stars');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }

        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.top = Math.random() * 50 + '%';
            star.style.left = (Math.random() * 30 + 70) + '%';
            starsContainer.appendChild(star);
            setTimeout(() => star.remove(), 3500);
        }

        setInterval(() => {
            if (Math.random() > 0.2) createShootingStar();
        }, 1200);
    </script>

</body>

</html>
